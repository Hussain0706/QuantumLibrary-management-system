# ═══════════════════════════════════════════════════════════
#  QuantumLibrary Backend — application.properties
# ═══════════════════════════════════════════════════════════

# Server
server.port=8080

# ─────────────────────────────────────────────────────────
#  H2 File-Based Database  (persists between restarts)
# ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./quantumlibrary-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Web Console → http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─────────────────────────────────────────────────────────
#  JWT Configuration
# ─────────────────────────────────────────────────────────
jwt.secret=QuantumLibrarySecretKey2026VeryLongSecureHmacKey1234567890ABCDEF
jwt.expiration=86400000

