# ─────────────────────────────────────────────────────────
#  Logging
# ─────────────────────────────────────────────────────────
logging.level.com.quantumlibrary=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %clr(%-5level){green} %clr(---){faint} %msg%n
