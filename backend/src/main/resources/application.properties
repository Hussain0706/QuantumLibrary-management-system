# Server
server.port=8080

# ─────────────────────────────────────────────────────────
#  MySQL Database  (run setup_database.sql first!)
#  MySQL User: root | Password: hussain07
# ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/quantumlibrary?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
